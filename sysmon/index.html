<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SysMon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── tokens ─────────────────────────────────────────────────────────────── */
:root {
  --bg:        #080c0d;
  --surface:   #0e1416;
  --surface2:  #141b1e;
  --border:    #1e2c30;
  --accent:    #00ff88;
  --accent2:   #00c8ff;
  --warn:      #ffb347;
  --crit:      #ff3f6c;
  --muted:     #4a6169;
  --text:      #c8dde3;
  --text-dim:  #6b8894;
  --font:      'JetBrains Mono', 'Fira Mono', monospace;
  --radius:    6px;
  --gap:       12px;
}

/* ── reset ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── scrollbar ───────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── topbar ──────────────────────────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding: 10px 16px;
  background: rgba(8,12,13,0.95);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
}
#topbar .logo {
  font-size: 1.1rem; font-weight: 700; color: var(--accent);
  letter-spacing: 0.08em;
  display: flex; align-items: center; gap: 8px;
}
#topbar .logo::before {
  content: '▣';
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.hostname-badge {
  font-size: 0.72rem; color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 3px; padding: 2px 7px;
}
.uptime-badge {
  font-size: 0.72rem; color: var(--accent2);
  margin-left: auto;
}
#refresh-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-dim); font-family: var(--font); font-size: 0.72rem;
  padding: 4px 10px; border-radius: var(--radius); cursor: pointer;
  transition: all .15s;
}
#refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
#last-updated { font-size: 0.68rem; color: var(--muted); }

/* interval selector */
.interval-sel {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-dim); font-family: var(--font); font-size: 0.72rem;
  padding: 3px 6px; border-radius: var(--radius); cursor: pointer;
}
.interval-sel:focus { outline: 1px solid var(--accent); }

/* ── nav tabs ────────────────────────────────────────────────────────────── */
#nav {
  display: flex; gap: 2px;
  padding: 8px 16px 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto; white-space: nowrap;
}
.nav-tab {
  font-family: var(--font); font-size: 0.75rem; font-weight: 500;
  color: var(--muted); background: none; border: none;
  padding: 6px 14px 8px;
  cursor: pointer; position: relative;
  border-bottom: 2px solid transparent;
  transition: color .15s;
  letter-spacing: 0.05em;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* ── main layout ─────────────────────────────────────────────────────────── */
#main { padding: var(--gap); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── section title ───────────────────────────────────────────────────────── */
.sec-title {
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 8px; padding-left: 2px;
}

/* ── grid helpers ────────────────────────────────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gap); }
.stack  { display: flex; flex-direction: column; gap: var(--gap); }

@media (max-width: 900px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
  #topbar { gap: 8px; }
  .uptime-badge { margin-left: 0; }
}

/* ── card ────────────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
}
.card-title {
  font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em;
  color: var(--text-dim); text-transform: uppercase;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.card-title .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}

/* ── stat row ────────────────────────────────────────────────────────────── */
.stat-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 3px 0; font-size: 0.78rem;
}
.stat-row .label { color: var(--text-dim); }
.stat-row .value { color: var(--text); font-weight: 500; }
.stat-row .value.hi { color: var(--warn); }
.stat-row .value.crit { color: var(--crit); }

/* ── big number ──────────────────────────────────────────────────────────── */
.big-num {
  font-size: 2.4rem; font-weight: 700; line-height: 1;
  color: var(--accent);
}
.big-num.warn { color: var(--warn); }
.big-num.crit { color: var(--crit); }
.big-unit { font-size: 0.75rem; color: var(--muted); margin-left: 4px; }

/* ── progress bar ────────────────────────────────────────────────────────── */
.bar-wrap {
  width: 100%; height: 6px; background: var(--surface2);
  border-radius: 3px; overflow: hidden; margin: 6px 0;
}
.bar-fill {
  height: 100%; border-radius: 3px;
  background: var(--accent);
  transition: width .4s ease;
}
.bar-fill.warn  { background: var(--warn); }
.bar-fill.crit  { background: var(--crit); }

.bar-label {
  display: flex; justify-content: space-between;
  font-size: 0.7rem; color: var(--muted); margin-top: 2px;
}

/* ── spark canvas ────────────────────────────────────────────────────────── */
.spark-canvas {
  width: 100%; height: 48px;
  display: block;
  margin-top: 8px;
}

/* ── cpu core grid ───────────────────────────────────────────────────────── */
#core-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
  gap: 6px;
  margin-top: 8px;
}
.core-cell {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 4px;
  text-align: center;
  font-size: 0.65rem;
}
.core-cell .core-label { color: var(--muted); margin-bottom: 4px; }
.core-cell .core-val { font-weight: 600; font-size: 0.75rem; }
.core-cell .core-bar { height: 3px; border-radius: 2px; margin-top: 4px; background: var(--accent); }

/* ── search/filter bar ───────────────────────────────────────────────────── */
.filter-bar {
  display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
}
.filter-input {
  flex: 1; min-width: 180px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 0.78rem;
  padding: 6px 10px; border-radius: var(--radius);
}
.filter-input:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
.filter-input::placeholder { color: var(--muted); }
.filter-select {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 0.78rem;
  padding: 5px 8px; border-radius: var(--radius); cursor: pointer;
}
.toggle-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); font-family: var(--font); font-size: 0.72rem;
  padding: 5px 10px; border-radius: var(--radius); cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.toggle-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.06); }

/* ── table ───────────────────────────────────────────────────────────────── */
.tbl-wrap { overflow-x: auto; border-radius: var(--radius); }
table {
  width: 100%; border-collapse: collapse;
  font-size: 0.75rem;
}
thead th {
  background: var(--surface2); color: var(--muted);
  font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 7px 10px; text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap; cursor: pointer; user-select: none;
}
thead th:hover { color: var(--text); }
thead th.sort-asc::after  { content: ' ▲'; color: var(--accent); }
thead th.sort-desc::after { content: ' ▼'; color: var(--accent); }
tbody tr { border-bottom: 1px solid rgba(30,44,48,0.6); transition: background .1s; }
tbody tr:hover { background: var(--surface2); }
tbody td { padding: 6px 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
.td-name { color: var(--text); font-weight: 500; }
.td-dim  { color: var(--text-dim); }
.td-accent { color: var(--accent); }
.td-warn { color: var(--warn); }
.td-crit { color: var(--crit); }

/* status pills */
.pill {
  display: inline-block; padding: 1px 7px; border-radius: 20px;
  font-size: 0.65rem; font-weight: 600; letter-spacing: 0.05em;
}
.pill-run  { background: rgba(0,255,136,.12); color: var(--accent); border: 1px solid rgba(0,255,136,.25); }
.pill-stop { background: rgba(255,63,108,.1);  color: var(--crit);   border: 1px solid rgba(255,63,108,.2); }
.pill-dead { background: rgba(74,97,105,.15);  color: var(--muted);  border: 1px solid var(--border); }
.pill-warn { background: rgba(255,179,71,.12); color: var(--warn);   border: 1px solid rgba(255,179,71,.25); }

/* ── temp badge ──────────────────────────────────────────────────────────── */
.temp-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 10px; font-size: 0.78rem;
  margin: 3px;
}
.temp-badge .temp-val { font-weight: 600; }

/* ── disk bar ────────────────────────────────────────────────────────────── */
.disk-card { padding: 10px 14px; }
.disk-mount { font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; }
.disk-dev   { font-size: 0.8rem; color: var(--text); font-weight: 600; }

/* ── network iface ───────────────────────────────────────────────────────── */
.iface-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 5px; padding: 10px 12px; font-size: 0.75rem;
}
.iface-name { font-weight: 700; color: var(--accent2); margin-bottom: 4px; }
.iface-ip   { color: var(--text); }
.iface-mac  { color: var(--muted); font-size: 0.67rem; }

/* ── gpu card ────────────────────────────────────────────────────────────── */
.gpu-name { font-size: 0.88rem; font-weight: 700; color: var(--accent2); margin-bottom: 10px; }
.vram-bar { height: 8px; }

/* ── alert banner ────────────────────────────────────────────────────────── */
.alert-banner {
  background: rgba(255,63,108,.08); border: 1px solid rgba(255,63,108,.3);
  border-radius: var(--radius); padding: 8px 12px;
  font-size: 0.75rem; color: var(--crit);
  margin-bottom: var(--gap);
}

/* ── no-data placeholder ─────────────────────────────────────────────────── */
.no-data {
  text-align: center; color: var(--muted); font-size: 0.78rem;
  padding: 30px 0;
}

/* ── loading overlay ─────────────────────────────────────────────────────── */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999; gap: 14px;
}
#loading .logo-big {
  font-size: 2rem; font-weight: 700; color: var(--accent);
  letter-spacing: 0.12em;
}
#loading .spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading .msg { font-size: 0.78rem; color: var(--muted); }

/* ── error toast ─────────────────────────────────────────────────────────── */
#err-toast {
  position: fixed; bottom: 16px; right: 16px;
  background: rgba(255,63,108,.15); border: 1px solid var(--crit);
  color: var(--crit); font-size: 0.75rem;
  padding: 8px 14px; border-radius: var(--radius);
  display: none; z-index: 9999; max-width: 300px;
}

/* ── responsive tweaks ───────────────────────────────────────────────────── */
@media (max-width: 480px) {
  .big-num { font-size: 1.8rem; }
  thead th, tbody td { font-size: 0.68rem; padding: 5px 7px; }
  .card { padding: 10px 11px; }
}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="logo-big">▣ SYSMON</div>
  <div class="spinner"></div>
  <div class="msg">Fetching system metrics…</div>
</div>

<!-- Error toast -->
<div id="err-toast"></div>

<!-- Top bar -->
<div id="topbar">
  <div class="logo">SYSMON</div>
  <span class="hostname-badge" id="tb-host">—</span>
  <span class="hostname-badge" id="tb-os">—</span>
  <span class="uptime-badge" id="tb-uptime">up —</span>
  <select class="interval-sel" id="interval-sel" title="Refresh interval">
    <option value="2000">2s</option>
    <option value="5000" selected>5s</option>
    <option value="10000">10s</option>
    <option value="30000">30s</option>
    <option value="0">paused</option>
  </select>
  <button id="refresh-btn">↺ Refresh</button>
  <span id="last-updated"></span>
</div>

<!-- Nav tabs -->
<div id="nav">
  <button class="nav-tab active" data-tab="overview">Overview</button>
  <button class="nav-tab" data-tab="cpu">CPU</button>
  <button class="nav-tab" data-tab="memory">Memory</button>
  <button class="nav-tab" data-tab="disks">Disks</button>
  <button class="nav-tab" data-tab="network">Network</button>
  <button class="nav-tab" data-tab="gpu">GPU / Temp</button>
  <button class="nav-tab" data-tab="processes">Processes</button>
  <button class="nav-tab" data-tab="services">Services</button>
</div>

<!-- Main content -->
<div id="main">

  <!-- ── OVERVIEW ──────────────────────────────────────────────────────── -->
  <div class="tab-panel active" id="tab-overview">
    <div id="alert-area"></div>
    <div class="grid-4" id="ov-stats" style="margin-bottom:var(--gap)"></div>
    <div class="grid-2" style="margin-bottom:var(--gap)">
      <div class="card">
        <div class="card-title"><span class="dot"></span>CPU Usage</div>
        <canvas class="spark-canvas" id="spark-cpu"></canvas>
      </div>
      <div class="card">
        <div class="card-title"><span class="dot" style="background:var(--accent2)"></span>Memory Usage</div>
        <canvas class="spark-canvas" id="spark-mem"></canvas>
      </div>
    </div>
    <div class="grid-2">
      <div class="card" id="ov-cpu-info"></div>
      <div class="card" id="ov-mem-info"></div>
    </div>
  </div>

  <!-- ── CPU ───────────────────────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-cpu">
    <div class="grid-2" style="margin-bottom:var(--gap)">
      <div class="card" id="cpu-main"></div>
      <div class="card">
        <div class="card-title"><span class="dot"></span>CPU Timeline</div>
        <canvas class="spark-canvas" id="spark-cpu2" style="height:80px"></canvas>
        <div id="cpu-times" style="margin-top:8px"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot"></span>Per-Core Usage</div>
      <div id="core-grid"></div>
    </div>
  </div>

  <!-- ── MEMORY ────────────────────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-memory">
    <div class="grid-2" style="margin-bottom:var(--gap)">
      <div class="card" id="mem-main"></div>
      <div class="card" id="mem-swap"></div>
    </div>
    <div class="card" style="margin-bottom:var(--gap)">
      <div class="card-title"><span class="dot" style="background:var(--accent2)"></span>Memory Timeline</div>
      <canvas class="spark-canvas" id="spark-mem2" style="height:80px"></canvas>
    </div>
  </div>

  <!-- ── DISKS ─────────────────────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-disks">
    <div class="filter-bar">
      <input class="filter-input" id="disk-search" placeholder="Filter partitions…">
    </div>
    <div id="disk-list" class="stack"></div>
  </div>

  <!-- ── NETWORK ───────────────────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-network">
    <div class="grid-4" id="net-stats" style="margin-bottom:var(--gap)"></div>
    <div class="sec-title">Interfaces</div>
    <div id="iface-list" class="grid-3"></div>
  </div>

  <!-- ── GPU / TEMP ────────────────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-gpu">
    <div id="gpu-list" class="stack" style="margin-bottom:var(--gap)"></div>
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--warn)"></span>Temperatures</div>
      <div id="temp-list"></div>
    </div>
    <div id="battery-card" style="margin-top:var(--gap);display:none">
      <div class="card" id="battery-inner"></div>
    </div>
  </div>

  <!-- ── PROCESSES ─────────────────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-processes">
    <div class="filter-bar">
      <input class="filter-input" id="proc-search" placeholder="Search name, user, PID…">
      <select class="filter-select" id="proc-status">
        <option value="">All states</option>
        <option value="running">running</option>
        <option value="sleeping">sleeping</option>
        <option value="zombie">zombie</option>
        <option value="stopped">stopped</option>
      </select>
      <button class="toggle-btn on" id="toggle-idle" title="Show/hide idle processes">Hide idle</button>
    </div>
    <div class="tbl-wrap">
      <table id="proc-table">
        <thead>
          <tr>
            <th data-col="pid">PID</th>
            <th data-col="name">Name</th>
            <th data-col="user">User</th>
            <th data-col="status">Status</th>
            <th data-col="cpu">CPU%</th>
            <th data-col="mem_pct">MEM%</th>
            <th data-col="mem_rss">RSS</th>
          </tr>
        </thead>
        <tbody id="proc-tbody"></tbody>
      </table>
    </div>
    <div id="proc-count" style="font-size:.7rem;color:var(--muted);margin-top:6px;padding-left:2px"></div>
  </div>

  <!-- ── SERVICES ──────────────────────────────────────────────────────── -->
  <div class="tab-panel" id="tab-services">
    <div class="filter-bar">
      <input class="filter-input" id="svc-search" placeholder="Search services…">
      <button class="toggle-btn on" id="toggle-active">Active only</button>
      <button class="toggle-btn" id="toggle-failed">Failed only</button>
    </div>
    <div class="tbl-wrap">
      <table id="svc-table">
        <thead>
          <tr>
            <th data-col="name">Service</th>
            <th data-col="load">Load</th>
            <th data-col="active">Active</th>
            <th data-col="sub">Sub-state</th>
            <th data-col="description">Description</th>
          </tr>
        </thead>
        <tbody id="svc-tbody"></tbody>
      </table>
    </div>
    <div id="svc-count" style="font-size:.7rem;color:var(--muted);margin-top:6px;padding-left:2px"></div>
  </div>

</div><!-- /main -->

<script>
// ── state ─────────────────────────────────────────────────────────────────
const API = '/health';
let data = null;
let refreshTimer = null;
let refreshInterval = 5000;

// Spark history
const HIST = 60;
const history = { cpu: [], mem: [] };

// Sort state
const sortState = { proc: { col: 'cpu', dir: -1 }, svc: { col: 'name', dir: 1 } };

// Filter state
let hideIdle = true;
let activeOnly = true;
let failedOnly = false;

// ── utils ─────────────────────────────────────────────────────────────────
const fmt_bytes = n => {
  const units = ['B','KB','MB','GB','TB'];
  let i = 0;
  while (Math.abs(n) >= 1024 && i < units.length-1) { n /= 1024; i++; }
  return `${n.toFixed(1)} ${units[i]}`;
};
const fmt_uptime = s => {
  const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600),
        m = Math.floor((s%3600)/60);
  return d > 0 ? `${d}d ${h}h ${m}m` : h > 0 ? `${h}h ${m}m` : `${m}m`;
};
const pct_color = p => p >= 90 ? 'crit' : p >= 70 ? 'warn' : '';
const bar_cls   = p => p >= 90 ? 'crit' : p >= 70 ? 'warn' : '';
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function srow(label, value, cls='') {
  return `<div class="stat-row"><span class="label">${label}</span><span class="value ${cls}">${value}</span></div>`;
}
function bar(pct, extra='') {
  const w = Math.min(100, Math.max(0, pct));
  return `<div class="bar-wrap${extra}"><div class="bar-fill ${bar_cls(pct)}" style="width:${w}%"></div></div>`;
}

// ── spark lines ───────────────────────────────────────────────────────────
function drawSpark(canvasId, data, color, height = 48) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth, h = height;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  if (data.length < 2) return;

  const max = 100, pad = 4;
  const xs = i => pad + (i / (HIST - 1)) * (w - pad * 2);
  const ys = v => pad + (1 - v / max) * (h - pad * 2);

  // gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '55');
  grad.addColorStop(1, color + '05');

  ctx.beginPath();
  data.forEach((v, i) => i === 0 ? ctx.moveTo(xs(i), ys(v)) : ctx.lineTo(xs(i), ys(v)));
  ctx.lineTo(xs(data.length - 1), h);
  ctx.lineTo(xs(0), h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // line
  ctx.beginPath();
  data.forEach((v, i) => i === 0 ? ctx.moveTo(xs(i), ys(v)) : ctx.lineTo(xs(i), ys(v)));
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // current value label
  const last = data[data.length - 1];
  ctx.fillStyle = color;
  ctx.font = `600 11px JetBrains Mono, monospace`;
  ctx.textAlign = 'right';
  ctx.fillText(last.toFixed(1) + '%', w - pad, pad + 10);
}

// ── fetch & render ────────────────────────────────────────────────────────
async function fetchData() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();

    // update history
    const cpu = data.cpu?.usage_total ?? 0;
    const mem = data.memory?.percent ?? 0;
    history.cpu.push(cpu); if (history.cpu.length > HIST) history.cpu.shift();
    history.mem.push(mem); if (history.mem.length > HIST) history.mem.shift();

    render();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('last-updated').textContent = 'updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    showErr('Cannot reach /health — is server.py running?');
    document.getElementById('loading').querySelector('.msg').textContent = 'Cannot connect to server.py on port 8056';
  }
}

function showErr(msg) {
  const t = document.getElementById('err-toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', 4000);
}

function render() {
  if (!data) return;
  renderTopbar();
  renderOverview();
  renderCPU();
  renderMemory();
  renderDisks();
  renderNetwork();
  renderGPU();
  renderProcesses();
  renderServices();
}

// ── processes tab ─────────────────────────────────────────────────────────
let procData = [];
function renderProcesses() {
  procData = data.processes || [];
  applyProcFilter();
}

function applyProcFilter() {
  const q = (document.getElementById('proc-search')?.value||'').toLowerCase();
  const st = document.getElementById('proc-status')?.value || '';
  const { col, dir } = sortState.proc;

  let rows = procData.filter(p => {
    if (hideIdle && p.cpu < 0.1 && p.mem_pct < 0.1) return false;
    if (st && p.status !== st) return false;
    if (q && !p.name.toLowerCase().includes(q) && !String(p.pid).includes(q) && !(p.user||'').toLowerCase().includes(q)) return false;
    return true;
  });

  rows.sort((a,b) => {
    let av = a[col], bv = b[col];
    if (typeof av === 'string') av = av.toLowerCase(), bv = bv.toLowerCase();
    return (av < bv ? -1 : av > bv ? 1 : 0) * dir;
  });

  const tbody = document.getElementById('proc-tbody');
  tbody.innerHTML = rows.slice(0,200).map(p => `
    <tr>
      <td class="td-dim">${p.pid}</td>
      <td class="td-name" title="${esc(p.name)}">${esc(p.name.slice(0,28))}</td>
      <td class="td-dim">${esc((p.user||'').slice(0,16))}</td>
      <td><span class="pill ${p.status==='running'?'pill-run':p.status==='zombie'?'pill-warn':'pill-dead'}">${p.status}</span></td>
      <td class="${p.cpu>=10?'td-crit':p.cpu>=5?'td-warn':'td-dim'}">${p.cpu.toFixed(1)}</td>
      <td class="td-dim">${p.mem_pct.toFixed(2)}</td>
      <td class="td-dim">${fmt_bytes(p.mem_rss)}</td>
    </tr>
  `).join('');

  document.getElementById('proc-count').textContent =
    `Showing ${Math.min(rows.length,200)} of ${rows.length} processes (${procData.length} total)`;
}

// ── services tab ──────────────────────────────────────────────────────────
let svcData = [];
function renderServices() {
  svcData = data.services || [];
  applySvcFilter();
}

function applySvcFilter() {
  const q = (document.getElementById('svc-search')?.value||'').toLowerCase();
  const { col, dir } = sortState.svc;

  let rows = svcData.filter(s => {
    if (activeOnly && s.active !== 'active' && s.active !== 'running') return false;
    if (failedOnly && s.active !== 'failed' && s.sub !== 'failed') return false;
    if (q && !s.name.toLowerCase().includes(q) && !(s.description||'').toLowerCase().includes(q)) return false;
    return true;
  });

  rows.sort((a,b) => {
    let av = (a[col]||'').toLowerCase(), bv = (b[col]||'').toLowerCase();
    return (av < bv ? -1 : av > bv ? 1 : 0) * dir;
  });

  const tbody = document.getElementById('svc-tbody');
  tbody.innerHTML = rows.slice(0,300).map(s => {
    const act = s.active || '';
    const cls = act === 'active' || act === 'running' ? 'pill-run'
              : act === 'failed' ? 'pill-stop' : 'pill-dead';
    return `
      <tr>
        <td class="td-name" title="${esc(s.name)}">${esc(s.name.slice(0,40))}</td>
        <td class="td-dim">${esc(s.load||'—')}</td>
        <td><span class="pill ${cls}">${esc(act||'—')}</span></td>
        <td class="td-dim">${esc(s.sub||'—')}</td>
        <td class="td-dim" title="${esc(s.description||'')}" style="max-width:200px">${esc((s.description||'').slice(0,50))}</td>
      </tr>
    `;
  }).join('');

  document.getElementById('svc-count').textContent =
    `Showing ${Math.min(rows.length,300)} of ${rows.length} services (${svcData.length} total)`;
}

// ── table sort ────────────────────────────────────────────────────────────
function setupSort(tableId, state, renderFn) {
  document.querySelector(`#${tableId} thead`).addEventListener('click', e => {
    const th = e.target.closest('th[data-col]');
    if (!th) return;
    const col = th.dataset.col;
    if (state.col === col) state.dir *= -1;
    else { state.col = col; state.dir = 1; }
    document.querySelectorAll(`#${tableId} thead th`).forEach(h => {
      h.classList.remove('sort-asc','sort-desc');
    });
    th.classList.add(state.dir===1?'sort-asc':'sort-desc');
    renderFn();
  });
}
setupSort('proc-table', sortState.proc, applyProcFilter);
setupSort('svc-table',  sortState.svc,  applySvcFilter);

document.getElementById('proc-search').addEventListener('input', applyProcFilter);
document.getElementById('proc-status').addEventListener('change', applyProcFilter);
document.getElementById('toggle-idle').addEventListener('click', function() {
  hideIdle = !hideIdle;
  this.classList.toggle('on', hideIdle);
  this.textContent = hideIdle ? 'Hide idle' : 'Show all';
  applyProcFilter();
});

document.getElementById('disk-search').addEventListener('input', () => {
  if (data) renderDisks();
});
document.getElementById('svc-search').addEventListener('input', applySvcFilter);

document.getElementById('toggle-active').addEventListener('click', function() {
  activeOnly = !activeOnly;
  if (activeOnly) failedOnly = false;
  this.classList.toggle('on', activeOnly);
  document.getElementById('toggle-failed').classList.toggle('on', false);
  applySvcFilter();
});
document.getElementById('toggle-failed').addEventListener('click', function() {
  failedOnly = !failedOnly;
  if (failedOnly) activeOnly = false;
  this.classList.toggle('on', failedOnly);
  document.getElementById('toggle-active').classList.toggle('on', false);
  applySvcFilter();
});

// ── refresh control ───────────────────────────────────────────────────────
document.getElementById('refresh-btn').addEventListener('click', fetchData);
document.getElementById('interval-sel').addEventListener('change', function() {
  refreshInterval = parseInt(this.value);
  clearInterval(refreshTimer);
  if (refreshInterval > 0) refreshTimer = setInterval(fetchData, refreshInterval);
});

// ── resize sparks ─────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (!data) return;
  drawSpark('spark-cpu',  history.cpu, '#00ff88', 60);
  drawSpark('spark-mem',  history.mem, '#00c8ff', 60);
  drawSpark('spark-cpu2', history.cpu, '#00ff88', 80);
  drawSpark('spark-mem2', history.mem, '#00c8ff', 80);
});

// ── bootstrap ─────────────────────────────────────────────────────────────
fetchData();
refreshTimer = setInterval(fetchData, refreshInterval);
</script>
</body>
</html>
